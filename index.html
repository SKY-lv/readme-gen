­¤ÜĆ ńē╣µĆ¦2
­¤ÆĪ ńē╣µĆ¦3" oninput="generate()"></textarea>

<script>
function showS(m){const e=document.getElementById('status');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2000);}

function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['code','preview'][i]===t));
  document.querySelectorAll('.tab-panel').forEach((el,i)=>el.classList.toggle('active',['tab-code','tab-preview'][i]==='tab-'+t));
}

function generate(){
  const name = document.getElementById('p-name').value || 'project-name';
  const desc = document.getElementById('p-desc').value || 'A powerful tool for solving problems.';
  const stack = document.getElementById('p-stack').value.split(',').map(s=>s.trim()).filter(s=>s);
  const install = document.getElementById('p-install').value || `npm install ${name}`;
  const usage = document.getElementById('p-usage').value || `import ${name}\n${name}.run()`;
  const features = document.getElementById('p-features').value.split('\n').filter(f=>f.trim());
  const screenshot = document.getElementById('p-screenshot').value;
  
  const optBadge = document.getElementById('opt-badge').checked;
  const optToc = document.getElementById('opt-toc').checked;
  const optContrib = document.getElementById('opt-contrib').checked;
  const optLicense = document.getElementById('opt-license').checked;
  const optChangelog = document.getElementById('opt-changelog').checked;
  
  let md = '';
  
  // Title
  md += `# ${name}\n\n`;
  md += `${desc}\n\n`;
  
  // Badges
  if (optBadge && stack.length) {
    md += stack.map(s => `![${s}](https://img.shields.io/badge/${encodeURIComponent(s)}-blue)`).join(' ') + '\n\n';
  }
  
  // Screenshot
  if (screenshot) {
    md += `![Screenshot](${screenshot})\n\n`;
  }
  
  // TOC
  if (optToc) {
    md += `## ­¤ōæ Table of Contents\n\n`;
    md += `- [Features](#-features)\n`;
    md += `- [Installation](#-installation)\n`;
    md += `- [Usage](#-usage)\n`;
    if (optContrib) md += `- [Contributing](#-contributing)\n`;
    if (optChangelog) md += `- [Changelog](#-changelog)\n`;
    if (optLicense) md += `- [License](#-license)\n`;
    md += '\n';
  }
  
  // Features
  if (features.length) {
    md += `## Ō£© Features\n\n`;
    md += features.map(f => `- ${f}`).join('\n') + '\n\n';
  }
  
  // Installation
  md += `## ­¤ō” Installation\n\n`;
  md += `\`\`\`bash\n${install}\n\`\`\`\n\n`;
  
  // Usage
  md += `## ­¤ÜĆ Usage\n\n`;
  md += `\`\`\`${stack[0]?.toLowerCase() || 'python'}\n${usage}\n\`\`\`\n\n`;
  
  // Contributing
  if (optContrib) {
    md += `## ­¤żØ Contributing\n\n`;
    md += `Contributions are welcome! Please feel free to submit a Pull Request.\n\n`;
    md += `1. Fork the repository\n`;
    md += `2. Create your feature branch (\`git checkout -b feature/AmazingFeature\`)\n`;
    md += `3. Commit your changes (\`git commit -m 'Add some AmazingFeature'\`)\n`;
    md += `4. Push to the branch (\`git push origin feature/AmazingFeature\`)\n`;
    md += `5. Open a Pull Request\n\n`;
  }
  
  // Changelog
  if (optChangelog) {
    md += `## ­¤ōØ Changelog\n\n`;
    md += `### v1.0.0\n- Initial release\n\n`;
  }
  
  // License
  if (optLicense) {
    md += `## ­¤ōä License\n\n`;
    md += `This project is licensed under the MIT License.\n`;
  }
  
  document.getElementById('output').textContent = md;
  document.getElementById('preview').innerHTML = renderMarkdown(md);
}

function renderMarkdown(md){
  // Simple markdown renderer
  let html = md
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/```(\w+)?\n([\s\S]+?)```/g, '<pre><code>$2</code></pre>')
    .replace(/!\[(.+?)\]\((.+?)\)/g, '<img alt="$1" src="$2" style="max-width:100%">')
    .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" style="color:#0969da">$1</a>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.+<\/li>\n?)+/g, '<ul>$&</ul>')
    .replace(/\n\n/g, '<br>');
  return html;
}

function copyMd(){
  const md = document.getElementById('output').textContent;
  navigator.clipboard.writeText(md).then(()=>showS('Ō£ģ ÕĘ▓ÕżŹÕłČ'));
}

function downloadMd(){
  const md = document.getElementById('output').textContent;
  const blob = new Blob([md], {type:'text/markdown'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'README.md';
  a.click();
}

// Init
generate();
